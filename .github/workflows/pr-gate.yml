name: PR Gate

# Server-side mirror of the local pre-push gate from the tatendaz-github skill.
# Catches anyone (human or agent) who bypassed the local checks.

on:
  pull_request:
    branches: [main, master]

jobs:
  docs-gate:
    name: Docs gate (features + summaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive branch slug
        id: slug
        run: |
          branch="${GITHUB_HEAD_REF}"
          slug="${branch#feat/}"
          slug="${slug#fix/}"
          slug="${slug#chore/}"
          slug="${slug#docs/}"
          slug="${slug#refactor/}"
          slug="${slug//\//-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Branch slug: $slug"

      # Both checks look at the PR's own diff (files added/renamed vs the
      # base), so entries left in the tree by older branches can't satisfy
      # a new PR.
      - name: Require docs/features entry
        env:
          BRANCH_SLUG: ${{ steps.slug.outputs.slug }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --quiet
          if ! git diff --name-status --diff-filter=AR "origin/$BASE_REF...HEAD" -- docs/features/ \
              | grep -E "docs/features/.*$BRANCH_SLUG\.md$" >/dev/null; then
            echo "::error::Missing docs/features/<date>-$BRANCH_SLUG.md in this PR's diff."
            echo "Add a feature-description markdown file under docs/features/ before merging."
            exit 1
          fi

      - name: Require docs/summaries entry
        env:
          BRANCH_SLUG: ${{ steps.slug.outputs.slug }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --quiet
          if ! git diff --name-status --diff-filter=AR "origin/$BASE_REF...HEAD" -- docs/summaries/ \
              | grep -E "docs/summaries/.*$BRANCH_SLUG\.md$" >/dev/null; then
            echo "::error::Missing docs/summaries/<date>-$BRANCH_SLUG.md in this PR's diff."
            echo "Add a session/prompt summary under docs/summaries/ before merging."
            exit 1
          fi

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The suite is stdlib-only unittest; it must pass with no installs.
      - name: Run tests (unittest)
        run: python3 -m unittest discover -s tests -v

      # Same files under pytest, matching how contributors often run them.
      - name: Run tests (pytest)
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests -q

  coverage-for-new-code:
    name: New code has new tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check that changed source files have changed tests
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base="$BASE_REF"
          git fetch origin "$base"
          changed=$(git diff --name-only "origin/$base...HEAD")
          src_changed=$(echo "$changed" | grep -Ev '(^|/)(test|tests|__tests__|spec|docs|\.github)/' \
            | grep -Ev '(_test\.go|\.test\.(ts|tsx|js|jsx)|\.spec\.(ts|tsx|js|jsx)|^test_|_spec\.rb)$' \
            | grep -E '(\.(py|ts|tsx|js|jsx|go|rs|rb|java|kt)$|^bin/claude-usage$)' || true)
          test_changed=$(echo "$changed" | grep -E '(^|/)(test|tests|__tests__|spec)/|_test\.go$|\.test\.(ts|tsx|js|jsx)$|\.spec\.(ts|tsx|js|jsx)$|/test_[^/]+\.py$|_spec\.rb$' || true)
          if [ -n "$src_changed" ] && [ -z "$test_changed" ]; then
            echo "::error::Source files changed but no test files changed:"
            echo "$src_changed"
            echo "Add tests covering the new behavior before merging."
            exit 1
          fi
          echo "Source changes: $(echo "$src_changed" | wc -l) file(s)"
          echo "Test changes:   $(echo "$test_changed" | wc -l) file(s)"
